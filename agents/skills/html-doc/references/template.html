<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #F5F4EE;
    --surface: #FAF9F5;
    --surface-alt: #F0EEE6;
    --ink: #1F1E1D;
    --ink-soft: #6B6A65;
    --accent: #D97757;
    --accent-strong: #C15F3C;
    --border: #E5E3DC;
    --code-bg: #2B2A27;
    --code-ink: #ECE9E0;
    --ok: #3F7E5E;
    --warn: #B5872B;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 2px rgba(31,30,29,.04), 0 8px 24px rgba(31,30,29,.05);
    --serif: Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.65;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 820px; margin: 0 auto; padding: 64px 28px 120px; }

  /* ---------- Typography ---------- */
  h1, h2, h3 { font-family: var(--serif); font-weight: 600; letter-spacing: -0.01em; line-height: 1.25; }
  h1 { font-size: 2.1rem; margin: 0 0 14px; }
  h2 {
    font-size: 1.5rem;
    margin: 56px 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  h2 .num { color: var(--accent); font-size: 1.05rem; margin-right: 10px; vertical-align: middle; }
  h3 { font-size: 1.15rem; margin: 28px 0 10px; }
  p { margin: 0 0 14px; }
  a { color: var(--accent-strong); text-decoration: none; border-bottom: 1px solid rgba(193,95,60,.35); }
  a:hover { border-bottom-color: var(--accent-strong); }
  strong { font-weight: 650; }
  code {
    font-family: var(--mono);
    font-size: .85em;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 5px;
    color: #4a3d36;
  }
  ul, ol { margin: 0 0 16px; padding-left: 22px; }
  li { margin: 6px 0; }

  /* ---------- Header block ---------- */
  .doc-head {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 34px;
    box-shadow: var(--shadow);
    margin-bottom: 8px;
  }
  .eyebrow {
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--accent-strong);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .doc-head h1 { margin-bottom: 8px; }
  .subtitle { color: var(--ink-soft); font-size: 1.05rem; margin-bottom: 20px; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: .76rem;
    font-weight: 600;
    padding: 4px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--ink-soft);
  }
  .badge.status { background: rgba(181,135,43,.12); border-color: rgba(181,135,43,.35); color: var(--warn); }
  .badge.aud { background: rgba(217,119,87,.1); border-color: rgba(217,119,87,.35); color: var(--accent-strong); }
  .badge.repo { font-family: var(--mono); font-size: .72rem; }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .8; }

  /* ---------- Lead / TL;DR ---------- */
  .lead {
    font-size: 1.08rem;
    color: var(--ink);
    background: rgba(217,119,87,.06);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 18px 22px;
    margin: 28px 0 8px;
  }
  .lead strong { color: var(--accent-strong); }

  /* ---------- Callouts ---------- */
  .callout {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 18px 16px 46px;
    margin: 20px 0;
    background: var(--surface);
    position: relative;
    font-size: .95rem;
  }
  .callout::before {
    position: absolute;
    left: 16px; top: 15px;
    font-size: 1.05rem;
    line-height: 1;
  }
  .callout.info { background: rgba(63,126,94,.07); border-color: rgba(63,126,94,.3); }
  .callout.info::before { content: "✓"; color: var(--ok); font-weight: 700; }
  .callout.warn { background: rgba(181,135,43,.09); border-color: rgba(181,135,43,.35); }
  .callout.warn::before { content: "!"; color: var(--warn); font-weight: 800; }
  .callout p:last-child { margin-bottom: 0; }
  .callout .ctitle { font-weight: 700; display: block; margin-bottom: 4px; }

  /* ---------- Goal / Non-goal · In / Out grid ---------- */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
  }
  .panel h3 { margin-top: 0; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
  .panel.goals h3, .panel.in h3 { color: var(--ok); }
  .panel.nongoals h3, .panel.out h3 { color: var(--ink-soft); }
  .panel ul { margin-bottom: 0; padding-left: 18px; }
  .panel li { font-size: .92rem; }

  /* ---------- Code blocks ---------- */
  pre {
    background: var(--code-bg);
    color: var(--code-ink);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: .82rem;
    line-height: 1.6;
    margin: 16px 0;
    box-shadow: var(--shadow);
  }
  pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
  .filelabel {
    font-family: var(--mono);
    font-size: .73rem;
    color: var(--ink-soft);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    padding: 6px 14px;
    display: inline-block;
    margin: 16px 0 -16px;
    position: relative;
    z-index: 1;
  }
  .filelabel + pre { border-top-left-radius: 0; }

  .tok-c { color: #b3ada0; font-style: italic; }   /* comment */
  .tok-k { color: #e0997a; }                         /* keyword */
  .tok-s { color: #a9c98c; }                         /* string */
  .tok-a { color: #d9b48a; }                         /* atom/symbol */
  .tok-f { color: #8ab6d6; }                         /* function */

  /* ---------- Tables ---------- */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: .9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { background: var(--surface-alt); font-weight: 650; font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); }
  tr:last-child td { border-bottom: none; }
  td code { font-size: .82em; }
  .new-row td { background: rgba(63,126,94,.08); }
  .tag-new { color: var(--ok); font-weight: 700; font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; }

  /* ---------- Flow diagram (vertical, technical) ---------- */
  .diagram {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin: 22px 0;
    box-shadow: var(--shadow);
  }
  .diagram .flow { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .node {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .node .nlabel { font-weight: 650; font-size: .95rem; }
  .node .nsub { font-size: .8rem; color: var(--ink-soft); margin-top: 2px; }
  .node code { font-size: .78em; }
  .node.accent { border-color: var(--accent); border-width: 1.5px; background: rgba(217,119,87,.06); }
  .node.accent .nlabel { color: var(--accent-strong); }
  .node.terminal { background: var(--surface-alt); border-style: dashed; }
  .node.muted { opacity: .72; }

  .arrow {
    width: 2px;
    height: 26px;
    background: var(--border);
    position: relative;
    flex: none;
  }
  .arrow::after {
    content: "";
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 7px solid var(--border);
  }
  .arrow .alabel {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    white-space: nowrap;
    font-size: .74rem;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* branch row */
  .branch { display: flex; gap: 28px; justify-content: center; width: 100%; align-items: flex-start; }
  .branch-col { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 300px; }
  .branch-tag {
    font-family: var(--mono);
    font-size: .72rem;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    background: var(--surface-alt);
    color: var(--ink-soft);
  }
  .branch-tag.fire { border-color: var(--accent); color: var(--accent-strong); background: rgba(217,119,87,.08); }

  /* ---------- Sequence / timeline ---------- */
  .timeline { margin: 22px 0; padding: 0; list-style: none; counter-reset: step; }
  .timeline li {
    position: relative;
    padding: 0 0 22px 52px;
    margin: 0;
  }
  .timeline li::before {
    counter-increment: step;
    content: counter(step);
    position: absolute;
    left: 0; top: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-weight: 700;
    font-size: .85rem;
    display: flex; align-items: center; justify-content: center;
  }
  .timeline li::after {
    content: "";
    position: absolute;
    left: 14px; top: 32px; bottom: -2px;
    width: 2px;
    background: var(--border);
  }
  .timeline li:last-child::after { display: none; }
  .timeline .actor { font-weight: 650; }
  .timeline .actor .who { font-family: var(--mono); font-size: .8rem; color: var(--accent-strong); background: rgba(217,119,87,.08); padding: 1px 7px; border-radius: 5px; }
  .timeline .desc { color: var(--ink-soft); font-size: .92rem; }

  /* ---------- Steps (technical) ---------- */
  ol.steps { counter-reset: s; list-style: none; padding: 0; margin: 22px 0; }
  ol.steps > li {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 18px 14px 56px;
    margin: 0 0 12px;
  }
  ol.steps > li::before {
    counter-increment: s;
    content: counter(s);
    position: absolute;
    left: 14px; top: 13px;
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--accent-strong);
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem;
  }
  ol.steps > li strong { display: block; margin-bottom: 2px; }
  ol.steps .repohint { font-family: var(--mono); font-size: .73rem; color: var(--ink-soft); }

  /* ---------- Component cards (technical) ---------- */
  .comp {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 22px 24px;
    margin: 20px 0;
    box-shadow: var(--shadow);
  }
  .comp h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .comp h3 .repo { font-family: var(--mono); font-size: .68rem; font-weight: 600; color: var(--ink-soft); background: var(--surface-alt); border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; }

  /* ---------- TOC ---------- */
  .toc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 24px;
    margin: 28px 0 8px;
    columns: 2;
    column-gap: 32px;
    font-size: .9rem;
  }
  .toc a { display: block; padding: 3px 0; border: none; color: var(--ink-soft); }
  .toc a:hover { color: var(--accent-strong); }
  .toc .tnum { color: var(--accent); font-weight: 700; display: inline-block; width: 22px; }

  /* ---------- Value cards (stakeholder) ---------- */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 22px 0; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 18px 18px 16px;
  }
  .card .ico { font-size: 1.4rem; display: block; margin-bottom: 8px; }
  .card h3 { margin: 0 0 6px; font-size: 1rem; }
  .card p { margin: 0; font-size: .9rem; color: var(--ink-soft); }

  /* ---------- Friendly step flow (stakeholder) ---------- */
  .fflow {
    display: flex; align-items: stretch; gap: 0; margin: 24px 0; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px 18px; box-shadow: var(--shadow);
  }
  .fstep { flex: 1 1 0; min-width: 130px; text-align: center; padding: 4px 10px; position: relative; }
  .fstep .circle {
    width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 10px;
    background: rgba(217,119,87,.1); border: 1.5px solid var(--accent);
    color: var(--accent-strong); font-weight: 700; font-family: var(--serif);
    display: flex; align-items: center; justify-content: center; font-size: 1.05rem;
  }
  .fstep h4 { margin: 0 0 4px; font-size: .92rem; font-family: var(--sans); font-weight: 650; }
  .fstep p { margin: 0; font-size: .82rem; color: var(--ink-soft); line-height: 1.45; }
  .fstep:not(:last-child)::after {
    content: "→"; position: absolute; right: -7px; top: 14px;
    color: var(--accent); font-size: 1.1rem; font-weight: 700;
  }

  /* ---------- Release roadmap (stakeholder) ---------- */
  .roadmap { list-style: none; padding: 0; margin: 22px 0; }
  .roadmap > li { position: relative; padding: 0 0 22px 40px; }
  .roadmap > li::before {
    content: ""; position: absolute; left: 8px; top: 6px; width: 13px; height: 13px;
    border-radius: 50%; background: var(--surface); border: 2.5px solid var(--accent); z-index: 1;
  }
  .roadmap > li.kick::before { background: var(--accent); box-shadow: 0 0 0 4px rgba(217,119,87,.15); }
  .roadmap > li::after { content: ""; position: absolute; left: 13px; top: 18px; bottom: -4px; width: 2px; background: var(--border); }
  .roadmap > li:last-child::after { display: none; }
  .roadmap .when {
    display: inline-block; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    color: var(--accent-strong); background: rgba(217,119,87,.08); border: 1px solid rgba(217,119,87,.3);
    border-radius: 999px; padding: 2px 10px; margin-bottom: 6px;
  }
  .roadmap h4 { margin: 0 0 3px; font-size: .98rem; font-family: var(--sans); font-weight: 650; }
  .roadmap p { margin: 0; font-size: .88rem; color: var(--ink-soft); }

  /* ---------- Talking points (stakeholder) ---------- */
  .quotes { margin: 20px 0; }
  .quote {
    background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm); padding: 14px 18px; margin: 0 0 12px; font-size: .96rem;
  }
  .quote .who { display: block; font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; color: var(--accent-strong); font-weight: 700; margin-bottom: 4px; }

  /* ---------- FAQ (stakeholder) ---------- */
  .faq { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin: 20px 0; }
  .faq details { border-bottom: 1px solid var(--border); }
  .faq details:last-child { border-bottom: none; }
  .faq summary {
    cursor: pointer; padding: 15px 20px; font-weight: 650; font-size: .98rem;
    list-style: none; display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq summary::after { content: "+"; color: var(--accent); font-size: 1.3rem; font-weight: 400; line-height: 1; flex: none; }
  .faq details[open] summary::after { content: "–"; }
  .faq summary:hover { color: var(--accent-strong); }
  .faq .answer { padding: 0 20px 16px; color: var(--ink-soft); font-size: .94rem; }
  .faq .answer p { margin: 0 0 8px; }
  .faq .answer p:last-child { margin-bottom: 0; }

  /* ---------- Checklist (stakeholder) ---------- */
  ul.check { list-style: none; padding: 0; margin: 18px 0; }
  ul.check li {
    position: relative; padding: 10px 14px 10px 44px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm); margin: 0 0 10px;
  }
  ul.check li::before {
    content: "✓"; position: absolute; left: 14px; top: 10px; color: var(--ok); font-weight: 800;
  }

  /* ---------- Footer ---------- */
  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--ink-soft);
    font-size: .82rem;
    text-align: center;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 680px) {
    .page { padding: 36px 18px 80px; }
    .cards, .two-col { grid-template-columns: 1fr; }
    .toc { columns: 1; }
    .branch { flex-direction: column; align-items: center; gap: 0; }
    .branch-col { max-width: 480px; }
    .fflow { flex-direction: column; }
    .fstep:not(:last-child)::after { content: "↓"; right: 50%; transform: translateX(50%); top: auto; bottom: -14px; }
    .fstep { padding-bottom: 18px; }
    h1 { font-size: 1.7rem; }
  }
</style>
</head>
